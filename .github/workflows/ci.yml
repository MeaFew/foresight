name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pin ruff to the same version as .pre-commit-config.yaml (rev: v0.11.0)
      - run: pip install ruff==0.11.0
      - run: ruff check src/ tests/ dashboard/
      - run: ruff format --check src/ tests/ dashboard/

  test:
    # CI installs only the lightweight test deps (no torch/lightning);
    # torch-dependent tests use pytest.importorskip. The coverage floor (20)
    # reflects what the light-deps suite can actually reach — keep it in sync
    # with pyproject.toml [tool.coverage.report] fail_under and the Makefile.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements-test.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-
      - run: pip install -r requirements-test.txt
      - run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=foresight --cov-report=term-missing --cov-fail-under=20

  typecheck:
    # Gradual typing: mypy reports but does not block CI yet.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mypy
      - run: mypy src/foresight || true
